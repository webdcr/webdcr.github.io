<!DOCTYPE html>
<html lang="en" x-data="directorateUploader()" x-init="init()">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Update Directorate CSV</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f0f0f0;
        color: #333;
        margin: 0;
        padding: 20px;
      }
      .upload-shell {
        max-width: 600px;
        margin: 0 auto;
      }
      .card {
        background: #ffffff;
        border: 1px solid #ccc;
        padding: 25px;
      }
      h1 {
        font-size: 22px;
        margin-top: 0;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: bold;
        margin-bottom: 5px;
      }
      input[type="text"],
      input[type="password"],
      input[type="file"] {
        width: 100%;
        border: 1px solid #aaa;
        padding: 8px;
        box-sizing: border-box;
        margin-bottom: 15px;
      }
      button {
        background: #0056b3;
        color: #fff;
        font-weight: bold;
        border: 1px solid #004494;
        padding: 10px 20px;
        cursor: pointer;
      }
      button:hover {
        background: #004494;
      }
      button:disabled {
        background: #ccc;
        border-color: #bbb;
        cursor: not-allowed;
      }
      .status {
        padding: 10px;
        font-size: 14px;
        margin-top: 15px;
        border: 1px solid #ccc;
      }
      .status.info {
        background: #e7f3ff;
        color: #004085;
        border-color: #b8daff;
      }
      .status.error {
        background: #f8d7da;
        color: #721c24;
        border-color: #f5c6cb;
      }
      .inline-hint {
        color: #666;
        font-size: 12px;
        margin-top: -10px;
        margin-bottom: 15px;
      }
    </style>
    <script defer src="/assets/js/alpine.js"></script>
    <script src="auth.js"></script>
  </head>
  <body>
    <div class="upload-shell">
      <a href="/admin/index.html" style="text-decoration: none; color: #0056b3; font-weight: bold; font-size: 13px;">&larr; Back to Dashboard</a>
      <div class="card" style="margin-top: 10px;">
        <h1>Upload new Directorate CSV</h1>
        <form @submit.prevent="handleSubmit">
          <div class="field-group">
            <label for="csvFile">Select updated directorate.csv</label>
            <input
              id="csvFile"
              type="file"
              accept=".csv"
              @change="handleFileChange"
              required
            />
          </div>

          <button type="submit" :disabled="isSubmitting || !fileContent || !token">
            <span x-show="!isSubmitting">Upload to GitHub</span>
            <span x-show="isSubmitting">Uploading…</span>
          </button>
        </form>

        <template x-if="statusMessage">
          <p class="status" :class="statusType" x-text="statusMessage"></p>
        </template>
      </div>
    </div>

    <script>
      function directorateUploader() {
        return {
          token: localStorage.getItem('gh_token') || '',
          fileContent: '',
          isSubmitting: false,
          statusMessage: '',
          statusType: 'info',
          init() {},
          saveToken() {
            localStorage.setItem('gh_token', this.token);
          },
          handleFileChange(event) {
            const file = event.target.files?.[0];
            if (!file) {
              this.fileContent = '';
              return;
            }
            file.text().then((text) => {
              this.fileContent = text;
            });
          },
          setStatus(message, type = 'info') {
            this.statusMessage = message;
            this.statusType = type === 'error' ? 'error' : 'info';
          },
          async handleSubmit() {
            this.isSubmitting = true;
            this.setStatus('Contacting GitHub…');
            try {
              const sha = await this.fetchCurrentSha();
              await this.uploadNewCsv(sha);
              this.setStatus('Success! The directorate CSV was updated.', 'info');
            } catch (error) {
              this.setStatus(error.message, 'error');
            } finally {
              this.isSubmitting = false;
            }
          },
          async fetchCurrentSha() {
            const endpoint = 'https://api.github.com/repos/webdcr/webdcr.github.io/contents/_data/directorate.csv';
            const res = await fetch(endpoint, {
              headers: { Authorization: `Bearer ${this.token}` }
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Could not find current CSV.');
            return data.sha;
          },
          async uploadNewCsv(sha) {
            const endpoint = 'https://api.github.com/repos/webdcr/webdcr.github.io/contents/_data/directorate.csv';
            const res = await fetch(endpoint, {
              method: 'PUT',
              headers: {
                Authorization: `Bearer ${this.token}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                message: 'Update directorate.csv via admin panel',
                content: btoa(unescape(encodeURIComponent(this.fileContent))),
                sha: sha
              })
            });
            if (!res.ok) {
              const data = await res.json();
              throw new Error(data.message || 'Upload failed.');
            }
          }
        };
      }
    </script>
  </body>
</html>
