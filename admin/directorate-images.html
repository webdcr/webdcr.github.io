<!DOCTYPE html>
<html lang="en" x-data="imageManager()" x-init="init()">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Directorate Images</title>
    <link rel="icon" href="/favicon.ico" />
    <script defer src="/assets/js/alpine.js"></script>
    <script src="auth.js"></script>
    <style>
      .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }
      .image-card { background: #fff; border: 1px solid #ccc; padding: 10px; }
      .image-preview { width: 100%; aspect-ratio: 1; object-fit: cover; background: #eee; border: 1px solid #ddd; }
      .image-info { padding-top: 10px; }
      .image-name { font-weight: bold; font-size: 12px; word-break: break-all; margin-bottom: 8px; height: 30px; overflow: hidden; }
      .image-actions { display: flex; gap: 5px; }
      
      .modal {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
        display: flex; align-items: center; justify-content: center; z-index: 1000;
      }
      .modal-content { background: #fff; padding: 20px; border: 1px solid #333; width: 90%; max-width: 400px; }
      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body>
    <div class="admin-content-wrapper">
      <div class="card">
        <h1>Manage Directorate Images</h1>
        <div class="field-group">
          <label>Select New Photos (Multiple allowed)</label>
          <input type="file" multiple accept="image/*" @change="selectedFiles = Array.from($event.target.files)" :disabled="!token" />
        </div>
        
        <button class="btn btn-primary" @click="handleFileUpload" :disabled="!token || selectedFiles.length === 0 || isUploading">
          <span x-show="!isUploading">Upload Selected Photos</span>
          <span x-show="isUploading">Uploading...</span>
        </button>

        <template x-if="statusMessage">
          <p class="status" :class="statusType" x-text="statusMessage"></p>
        </template>
      </div>

      <div class="card">
        <h2>Directorate Assignments</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 15px;">
          Assign photos to directorate members. Selecting <strong>placeholder.png</strong> will "unassign" the person.
        </p>
        <div class="csv-table-wrapper" style="max-height: 400px; overflow-y: auto; border: 1px solid #ccc;">
          <table class="csv-table" style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr style="background: #f0f0f0; position: sticky; top: 0; z-index: 10;">
                <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Name</th>
                <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Position</th>
                <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Assigned Photo</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="person in directors" :key="person.name">
                <tr style="border-bottom: 1px solid #eee;">
                  <td style="padding: 10px; font-size: 14px;" x-text="person.name"></td>
                  <td style="padding: 10px; font-size: 12px; color: #666;" x-text="person.position"></td>
                  <td style="padding: 10px;">
                    <select @change="updateAssignment(person.name, $event.target.value)" :disabled="loading" style="width: 100%; padding: 4px;">
                      <option value="placeholder.png" :selected="person.image === 'placeholder.png'">-- No Photo (placeholder) --</option>
                      <template x-for="img in images.sort((a,b) => a.name.localeCompare(b.name))" :key="img.name">
                        <option :value="img.name" x-text="img.name" :selected="person.image === img.name"></option>
                      </template>
                    </select>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2>Manage Photo Files</h2>
          <div style="display: flex; gap: 10px;">
            <button class="btn" @click="fetchImages(); fetchDirectors();" :disabled="loading">Refresh</button>
          </div>
        </div>
        <p style="font-size: 13px; color: #666;">These are the files available in <code>/assets/images/directorate/</code>.</p>
        
        <div class="image-grid" x-show="!loading">
          <template x-for="img in images" :key="img.path">
            <div class="image-card">
              <img :src="img.download_url" class="image-preview" loading="lazy" />
              <div class="image-info">
                <div class="image-name" x-text="img.name"></div>
                <div class="image-actions">
                  <button class="btn btn-danger" @click="deleteImage(img)" style="width: 100%;">Delete File</button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <script>
      function imageManager() {
        return {
          token: window.AdminAuth.getToken(),
          repo: 'webdcr/webdcr.github.io',
          path: 'assets/images/directorate',
          csvPath: '_data/directorate.csv',
          images: [],
          directors: [],
          loading: false,
          statusMessage: '',
          statusType: 'info',
          selectedFiles: [],
          isUploading: false,

          init() {
            this.fetchImages();
            this.fetchDirectors();
            window.addEventListener('admin-auth-changed', () => {
              this.token = window.AdminAuth.getToken();
              if (this.token) {
                this.fetchImages();
                this.fetchDirectors();
              }
            });
          },

          setStatus(msg, type = 'info') {
            this.statusMessage = msg;
            this.statusType = type;
            if (type === 'info') setTimeout(() => { if(this.statusMessage === msg) this.statusMessage = ''; }, 5000);
          },

          async fetchImages() {
            this.loading = true;
            try {
              const headers = {};
              if (this.token) headers.Authorization = `Bearer ${this.token}`;
              const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.path}`, { headers });
              if (!res.ok) throw new Error('Failed to fetch images');
              const data = await res.json();
              this.images = data.filter(file => /\.(jpg|jpeg|png|gif|webp|heic)$/i.test(file.name));
            } catch (e) { this.setStatus(e.message, 'error'); } finally { this.loading = false; }
          },

          async handleFileUpload() {
            if (!this.selectedFiles.length) return;
            this.isUploading = true;
            this.setStatus(`Uploading ${this.selectedFiles.length} photos...`);
            for (const file of this.selectedFiles) {
              try {
                const reader = new FileReader();
                const content = await new Promise((resolve) => {
                  reader.onload = () => resolve(reader.result.split(',')[1]);
                  reader.readAsDataURL(file);
                });
                await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.path}/${file.name}`, {
                  method: 'PUT',
                  headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ message: `Upload photo: ${file.name}`, content: content })
                });
              } catch (e) { this.setStatus(`Error: ${e.message}`, 'error'); break; }
            }
            this.setStatus('Upload complete!');
            this.selectedFiles = [];
            this.isUploading = false;
            this.fetchImages();
          },

          async deleteImage(img) {
            const usedBy = this.directors.filter(d => d.image === img.name).map(d => d.name);
            let msg = `Delete ${img.name}?`;
            if (usedBy.length > 0) {
              msg = `${img.name} is currently used by: ${usedBy.join(', ')}. Deleting it will leave these people with no photo. Continue?`;
            }
            if (!confirm(msg)) return;

            try {
              await fetch(`https://api.github.com/repos/${this.repo}/contents/${img.path}`, {
                method: 'DELETE',
                headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Delete photo: ${img.name}`, sha: img.sha })
              });
              this.fetchImages();
            } catch (e) { this.setStatus(e.message, 'error'); }
          },

          parseCSV(str) {
            const rows = [];
            let current = [];
            let inQuotes = false;
            let val = '';
            for (let i = 0; i < str.length; i++) {
              const char = str[i];
              const nextChar = str[i+1];
              if (char === '"' && inQuotes && nextChar === '"') { val += '"'; i++; }
              else if (char === '"') inQuotes = !inQuotes;
              else if (char === ',' && !inQuotes) { current.push(val); val = ''; }
              else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                current.push(val); rows.push(current); current = []; val = '';
              } else val += char;
            }
            if (val !== '' || current.length > 0) { current.push(val); rows.push(current); }
            return rows;
          },

          stringifyCSV(rows) {
            return rows.map(row => row.map(val => {
              val = String(val || '');
              if (val.includes(',') || val.includes('"') || val.includes('\n') || val.includes('\r')) {
                return `"${val.replace(/"/g, '""')}"`;
              }
              return val;
            }).join(',')).join('\n');
          },

          async fetchDirectors() {
            try {
              const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.csvPath}`, {
                headers: this.token ? { Authorization: `Bearer ${this.token}` } : {}
              });
              if (!res.ok) return;
              const data = await res.json();
              const content = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));
              const parsed = this.parseCSV(content);
              if (parsed.length > 0) {
                const headers = parsed[0];
                const nameIdx = headers.indexOf('Name');
                const firstIdx = headers.indexOf('First');
                const lastIdx = headers.indexOf('Last');
                const posIdx = headers.indexOf('Position');
                const imgIdx = headers.indexOf('Image');
                
                this.directors = parsed.slice(1).map(row => {
                   let name = row[nameIdx];
                   if (!name) {
                     name = (row[firstIdx] || '') + ' ' + (row[lastIdx] || '');
                     name = name.trim();
                   }
                   return {
                     name: name,
                     position: row[posIdx],
                     image: row[imgIdx] || 'placeholder.png'
                   };
                }).filter(d => d.name);
              }
            } catch (e) { console.error('Error fetching directors', e); }
          },

          async updateAssignment(personName, imageName) {
            this.setStatus(`Saving photo for "${personName}"...`);
            this.loading = true;
            try {
              const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.csvPath}`, {
                headers: { Authorization: `Bearer ${this.token}` }
              });
              const data = await res.json();
              const content = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));
              const parsed = this.parseCSV(content);
              
              const headers = parsed[0];
              const nameIdx = headers.indexOf('Name');
              const firstIdx = headers.indexOf('First');
              const lastIdx = headers.indexOf('Last');
              const imgIdx = headers.indexOf('Image');

              if (imgIdx === -1) throw new Error("Image column not found in CSV");

              let updated = false;
              for (let i = 1; i < parsed.length; i++) {
                let rowName = parsed[i][nameIdx];
                if (!rowName) {
                  rowName = (parsed[i][firstIdx] || '') + ' ' + (parsed[i][lastIdx] || '');
                  rowName = rowName.trim();
                }

                if (rowName === personName) {
                  parsed[i][imgIdx] = imageName;
                  updated = true;
                  break;
                }
              }

              if (!updated) throw new Error(`Person "${personName}" not found in CSV`);

              const newContent = this.stringifyCSV(parsed);
              const putRes = await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.csvPath}`, {
                method: 'PUT',
                headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  message: `Assign ${imageName} to ${personName}`,
                  content: btoa(unescape(encodeURIComponent(newContent))),
                  sha: data.sha
                })
              });

              if (!putRes.ok) throw new Error("Failed to save to GitHub");

              this.setStatus(`Success! "${personName}" photo updated.`);
              await this.fetchDirectors();
            } catch (e) {
              this.setStatus(`Error: ${e.message}`, 'error');
              await this.fetchDirectors();
            } finally {
              this.loading = false;
            }
          }
        };
      }
    </script>
  </body>
</html>
