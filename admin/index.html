<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebDCR Admin</title>
    <link rel="icon" href="/favicon.ico" />
    <script src="auth.js"></script>
    <style>
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 15px;
      }
      .card-link {
        background: #f9f9f9;
        border: 1px solid #ddd;
        padding: 20px;
        text-decoration: none;
        color: #0056b3;
        display: block;
      }
      .card-link:hover {
        background: #f0f4f8;
        border-color: #0056b3;
      }
      .card-link h2 {
        font-size: 18px;
        margin: 0 0 8px 0;
        text-decoration: underline;
      }
      .card-link span {
        font-size: 13px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="admin-content-wrapper">
      <div class="card">
        <h1>WebDCR admin</h1>
        <div class="card-grid">
          <a class="card-link" href="/admin/cms/">
            <h2>Open CMS</h2>
          </a>
          <a class="card-link" href="/admin/shows-upload.html">
            <h2>Update schedule CSV</h2>
          </a>
          <a class="card-link" href="/admin/shows-images.html">
            <h2>Manage show images</h2>
          </a>
          <a class="card-link" href="/admin/directorate-upload.html">
            <h2>Update directorate CSV</h2>
          </a>
          <a class="card-link" href="/admin/directorate-images.html">
            <h2>Manage directorate photos</h2>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
