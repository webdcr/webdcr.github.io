<!DOCTYPE html>
<html lang="en" x-data="imageManager()" x-init="init()">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Show Images</title>
    <link rel="icon" href="/favicon.ico" />
    <script defer src="/assets/js/alpine.js"></script>
    <script src="auth.js"></script>
    <style>
      .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }
      .image-card { background: #fff; border: 1px solid #ccc; padding: 10px; }
      .image-preview { width: 100%; aspect-ratio: 1; object-fit: cover; background: #eee; border: 1px solid #ddd; }
      .image-info { padding-top: 10px; }
      .image-name { font-weight: bold; font-size: 12px; word-break: break-all; margin-bottom: 8px; height: 30px; overflow: hidden; }
      .image-actions { display: flex; gap: 5px; }
      
      .modal {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
        display: flex; align-items: center; justify-content: center; z-index: 1000;
      }
      .modal-content { background: #fff; padding: 20px; border: 1px solid #333; width: 90%; max-width: 400px; }
      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body>
    <div class="admin-content-wrapper">
      <div class="card">
        <h1>Manage Show Images</h1>
        <div class="field-group">
          <label>Select New Images (Multiple allowed)</label>
          <input type="file" multiple accept="image/*" @change="selectedFiles = Array.from($event.target.files)" :disabled="!token" />
        </div>
        
        <button class="btn btn-primary" @click="handleFileUpload" :disabled="!token || selectedFiles.length === 0 || isUploading">
          <span x-show="!isUploading">Upload Selected Images</span>
          <span x-show="isUploading">Uploading...</span>
        </button>

        <template x-if="statusMessage">
          <p class="status" :class="statusType" x-text="statusMessage"></p>
        </template>
      </div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2>Current Images</h2>
          <div style="display: flex; gap: 10px;">
            <button class="btn btn-danger" @click="deleteAllImages" :disabled="loading || images.length === 0">Delete All</button>
            <button class="btn" @click="fetchImages" :disabled="loading">
              <span x-show="!loading">Refresh List</span>
              <span x-show="loading">Loading...</span>
            </button>
          </div>
        </div>
        
        <div class="image-grid" x-show="!loading">
          <template x-for="img in images" :key="img.path">
            <div class="image-card">
              <img :src="img.download_url" class="image-preview" loading="lazy" />
              <div class="image-info">
                <div class="image-name" x-text="img.name"></div>
                <div class="image-actions">
                  <button class="btn" @click="startRename(img)">Rename</button>
                  <button class="btn btn-danger" @click="deleteImage(img)">Delete</button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <script>
      function imageManager() {
        return {
          token: window.AdminAuth.getToken(),
          repo: 'webdcr/webdcr.github.io',
          path: 'assets/images/showalbums',
          images: [],
          shows: [],
          loading: false,
          statusMessage: '',
          statusType: 'info',
          selectedFiles: [],
          isUploading: false,

          init() {
            this.fetchImages();
            this.fetchShows();
            window.addEventListener('admin-auth-changed', () => {
              this.token = window.AdminAuth.getToken();
            });
          },

          setStatus(msg, type = 'info') {
            this.statusMessage = msg;
            this.statusType = type;
            if (type === 'info') setTimeout(() => this.statusMessage = '', 5000);
          },

          async fetchImages() {
            this.loading = true;
            try {
              const headers = {};
              if (this.token) headers.Authorization = `Bearer ${this.token}`;
              const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.path}`, { headers });
              if (!res.ok) throw new Error('Failed to fetch images');
              const data = await res.json();
              this.images = data.filter(file => /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name));
            } catch (e) { this.setStatus(e.message, 'error'); } finally { this.loading = false; }
          },

          async handleFileUpload() {
            if (!this.selectedFiles.length) return;
            this.isUploading = true;
            this.setStatus(`Uploading ${this.selectedFiles.length} images...`);
            for (const file of this.selectedFiles) {
              try {
                const reader = new FileReader();
                const content = await new Promise((resolve) => {
                  reader.onload = () => resolve(reader.result.split(',')[1]);
                  reader.readAsDataURL(file);
                });
                await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.path}/${file.name}`, {
                  method: 'PUT',
                  headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ message: `Upload photo: ${file.name}`, content: content })
                });
              } catch (e) { this.setStatus(`Error: ${e.message}`, 'error'); break; }
            }
            this.setStatus('Upload complete!');
            this.selectedFiles = [];
            this.isUploading = false;
            this.fetchImages();
          },

          async deleteAllImages() {
            if (!confirm(`Are you sure you want to delete ALL ${this.images.length} images? This cannot be undone.`)) return;
            this.loading = true;
            this.setStatus(`Deleting ${this.images.length} images...`);
            for (const img of this.images) {
              try {
                await fetch(`https://api.github.com/repos/${this.repo}/contents/${img.path}`, {
                  method: 'DELETE',
                  headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ message: `Delete all: ${img.name}`, sha: img.sha })
                });
              } catch (e) { console.error(e); }
            }
            this.setStatus('All images deleted.');
            this.fetchImages();
          },

          async deleteImage(img) {
            if (!confirm(`Delete ${img.name}?`)) return;
            try {
              await fetch(`https://api.github.com/repos/${this.repo}/contents/${img.path}`, {
                method: 'DELETE',
                headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Delete photo: ${img.name}`, sha: img.sha })
              });
              this.fetchImages();
            } catch (e) { this.setStatus(e.message, 'error'); }
          },

          async fetchShows() {
            try {
              const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/_data/shows.csv`, {
                headers: this.token ? { Authorization: `Bearer ${this.token}` } : {}
              });
              if (!res.ok) return;
              const data = await res.json();
              const content = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));
              const lines = content.split(/\r?\n/);
              const showList = [];
              for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (!line.trim()) continue;
                let cols = [];
                let inQuotes = false;
                let val = '';
                for (let j = 0; j < line.length; j++) {
                  if (line[j] === '"') inQuotes = !inQuotes;
                  else if (line[j] === ',' && !inQuotes) { cols.push(val); val = ''; }
                  else val += line[j];
                }
                cols.push(val);
                if (cols.length >= 1 && cols[0]) {
                  const originalName = cols[0];
                  const idName = originalName.toLowerCase().replace(/[^a-z]/g, '');
                  if (idName) {
                    showList.push({ name: originalName, id: idName });
                  }
                }
              }
              this.shows = showList;
            } catch (e) { console.error('Error fetching shows', e); }
          },

          async assignShow(img, newId) {
            let targetId = newId;
            if (!targetId) {
              // Generate random 8-digit hex for unassigned
              targetId = Math.floor(Math.random() * 0xffffffff).toString(16).padStart(8, '0');
            }

            const ext = img.name.substring(img.name.lastIndexOf('.'));
            const newName = targetId + ext;
            if (newName === img.name) return;

            // Check if any existing image matches the targetId (ignoring extension)
            const exists = this.images.some(existingImg => {
              const existingId = existingImg.name.substring(0, existingImg.name.lastIndexOf('.')).toLowerCase();
              return existingId === targetId.toLowerCase() && existingImg.name !== img.name;
            });

            if (exists) {
              alert(`An image for ${newId} already exists! Please delete, reassign or unassign it first if you wish to replace it.`);
              const currentId = img.name.substring(0, img.name.lastIndexOf('.')).toLowerCase();
              event.target.value = this.shows.some(s => s.id === currentId) ? currentId : '';
              return;
            }

            if (!confirm(`Rename ${img.name} to ${newName}?`)) {
              // Revert select if cancelled by triggering a re-render
              const currentId = img.name.substring(0, img.name.lastIndexOf('.')).toLowerCase();
              event.target.value = this.shows.some(s => s.id === currentId) ? currentId : '';
              return;
            }

            this.setStatus(`Renaming to ${newName}...`);
            this.loading = true;
            try {
              const resBlob = await fetch(`https://api.github.com/repos/${this.repo}/git/blobs/${img.sha}`, {
                headers: { Authorization: `Bearer ${this.token}` }
              });
              const blobData = await resBlob.json();
              
              await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.path}/${newName}`, {
                method: 'PUT',
                headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Assign image to ${targetId}`, content: blobData.content })
              });
              
              await fetch(img.url, {
                method: 'DELETE',
                headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Cleanup after assignment`, sha: img.sha })
              });
              
              this.setStatus(newId ? `Assigned to ${newId}` : `Unassigned photo`);
              this.fetchImages();
            } catch (e) {
              this.setStatus(`Error: ${e.message}`, 'error');
              this.loading = false;
            }
          }
        };
      }
    </script>
  </body>
</html>
