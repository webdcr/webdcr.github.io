<!DOCTYPE html>
<html lang="en" x-data="imageManager()" x-init="init()">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Show Images</title>
    <link rel="icon" href="/favicon.ico" />
    <script defer src="/assets/js/alpine.js"></script>
    <script src="auth.js"></script>
    <style>
      .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }
      .image-card { background: #fff; border: 1px solid #ccc; padding: 10px; }
      .image-preview { width: 100%; aspect-ratio: 1; object-fit: cover; background: #eee; border: 1px solid #ddd; }
      .image-info { padding-top: 10px; }
      .image-name { font-weight: bold; font-size: 12px; word-break: break-all; margin-bottom: 8px; height: 30px; overflow: hidden; }
      .image-actions { display: flex; gap: 5px; }
      
      .modal {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
        display: flex; align-items: center; justify-content: center; z-index: 1000;
      }
      .modal-content { background: #fff; padding: 20px; border: 1px solid #333; width: 90%; max-width: 400px; }
      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body>
    <div class="admin-content-wrapper">
      <div class="card">
        <h1>Manage Show Images</h1>
        <div class="field-group">
          <label>Select New Images (Multiple allowed)</label>
          <input type="file" multiple accept="image/*" @change="selectedFiles = Array.from($event.target.files)" :disabled="!token" />
        </div>
        
        <button class="btn btn-primary" @click="handleFileUpload" :disabled="!token || selectedFiles.length === 0 || isUploading">
          <span x-show="!isUploading">Upload Selected Images</span>
          <span x-show="isUploading">Uploading...</span>
        </button>

        <template x-if="statusMessage">
          <p class="status" :class="statusType" x-text="statusMessage"></p>
        </template>
      </div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2>Current Images</h2>
          <div style="display: flex; gap: 10px;">
            <button class="btn btn-danger" @click="deleteAllImages" :disabled="loading || images.length === 0">Delete All</button>
            <button class="btn" @click="fetchImages" :disabled="loading">
              <span x-show="!loading">Refresh List</span>
              <span x-show="loading">Loading...</span>
            </button>
          </div>
        </div>
        
        <div class="image-grid" x-show="!loading">
          <template x-for="img in images" :key="img.path">
            <div class="image-card">
              <img :src="img.download_url" class="image-preview" loading="lazy" />
              <div class="image-info">
                <div class="image-name" x-text="img.name"></div>
                <div style="margin-bottom: 8px;">
                  <select @change="assignShow(img.name, $event.target.value)" style="width: 100%; font-size: 12px; padding: 4px;" :disabled="loading">
                    <option value="placeholder.png">-- Unassigned --</option>
                    <template x-for="show in shows" :key="show.name">
                      <option :value="show.name" x-text="show.name" :selected="show.image === img.name"></option>
                    </template>
                  </select>
                </div>
                <div class="image-actions">
                  <button class="btn btn-danger" @click="deleteImage(img)" style="width: 100%;">Delete</button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <script>
      function imageManager() {
        return {
          token: window.AdminAuth.getToken(),
          repo: 'webdcr/webdcr.github.io',
          path: 'assets/images/showalbums',
          csvPath: '_data/shows.csv',
          images: [],
          shows: [],
          csvSha: '',
          loading: false,
          statusMessage: '',
          statusType: 'info',
          selectedFiles: [],
          isUploading: false,

          init() {
            this.fetchImages();
            this.fetchShows();
            window.addEventListener('admin-auth-changed', () => {
              this.token = window.AdminAuth.getToken();
              if (this.token) {
                this.fetchImages();
                this.fetchShows();
              }
            });
          },

          setStatus(msg, type = 'info') {
            this.statusMessage = msg;
            this.statusType = type;
            if (type === 'info') setTimeout(() => { if(this.statusMessage === msg) this.statusMessage = ''; }, 5000);
          },

          async fetchImages() {
            this.loading = true;
            try {
              const headers = {};
              if (this.token) headers.Authorization = `Bearer ${this.token}`;
              const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.path}`, { headers });
              if (!res.ok) throw new Error('Failed to fetch images');
              const data = await res.json();
              this.images = data.filter(file => /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name));
            } catch (e) { this.setStatus(e.message, 'error'); } finally { this.loading = false; }
          },

          async handleFileUpload() {
            if (!this.selectedFiles.length) return;
            this.isUploading = true;
            this.setStatus(`Uploading ${this.selectedFiles.length} images...`);
            for (const file of this.selectedFiles) {
              try {
                const reader = new FileReader();
                const content = await new Promise((resolve) => {
                  reader.onload = () => resolve(reader.result.split(',')[1]);
                  reader.readAsDataURL(file);
                });
                await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.path}/${file.name}`, {
                  method: 'PUT',
                  headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ message: `Upload photo: ${file.name}`, content: content })
                });
              } catch (e) { this.setStatus(`Error: ${e.message}`, 'error'); break; }
            }
            this.setStatus('Upload complete!');
            this.selectedFiles = [];
            this.isUploading = false;
            this.fetchImages();
          },

          async deleteAllImages() {
            if (!confirm(`Are you sure you want to delete ALL ${this.images.length} images? This cannot be undone.`)) return;
            this.loading = true;
            this.setStatus(`Deleting ${this.images.length} images...`);
            for (const img of this.images) {
              try {
                await fetch(`https://api.github.com/repos/${this.repo}/contents/${img.path}`, {
                  method: 'DELETE',
                  headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ message: `Delete all: ${img.name}`, sha: img.sha })
                });
              } catch (e) { console.error(e); }
            }
            this.setStatus('All images deleted.');
            this.fetchImages();
          },

          async deleteImage(img) {
            if (!confirm(`Delete ${img.name}?`)) return;
            try {
              await fetch(`https://api.github.com/repos/${this.repo}/contents/${img.path}`, {
                method: 'DELETE',
                headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Delete photo: ${img.name}`, sha: img.sha })
              });
              this.fetchImages();
            } catch (e) { this.setStatus(e.message, 'error'); }
          },

          parseCSV(str) {
            const rows = [];
            let current = [];
            let inQuotes = false;
            let val = '';
            for (let i = 0; i < str.length; i++) {
              const char = str[i];
              const nextChar = str[i+1];
              if (char === '"' && inQuotes && nextChar === '"') { val += '"'; i++; }
              else if (char === '"') inQuotes = !inQuotes;
              else if (char === ',' && !inQuotes) { current.push(val); val = ''; }
              else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                current.push(val); rows.push(current); current = []; val = '';
              } else val += char;
            }
            if (val !== '' || current.length > 0) { current.push(val); rows.push(current); }
            return rows;
          },

          stringifyCSV(rows) {
            return rows.map(row => row.map(val => {
              val = String(val || '');
              if (val.includes(',') || val.includes('"') || val.includes('\n') || val.includes('\r')) {
                return `"${val.replace(/"/g, '""')}"`;
              }
              return val;
            }).join(',')).join('\n');
          },

          async fetchShows() {
            try {
              const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.csvPath}`, {
                headers: this.token ? { Authorization: `Bearer ${this.token}` } : {}
              });
              if (!res.ok) return;
              const data = await res.json();
              this.csvSha = data.sha;
              const content = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));
              const parsed = this.parseCSV(content);
              if (parsed.length > 0) {
                const headers = parsed[0];
                const nameIdx = headers.indexOf('Name');
                const imgIdx = headers.indexOf('Image');
                this.shows = parsed.slice(1).map(row => ({
                  name: row[nameIdx],
                  image: row[imgIdx] || 'placeholder.png'
                })).filter(s => s.name);
                this.csvHeaders = headers;
                this.csvRows = parsed.slice(1);
              }
            } catch (e) { console.error('Error fetching shows', e); }
          },

          async assignShow(imageName, showName) {
            this.setStatus(`Updating assignment...`);
            this.loading = true;
            try {
              // 1. Refetch CSV to get latest SHA and avoid conflicts
              const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.csvPath}`, {
                headers: { Authorization: `Bearer ${this.token}` }
              });
              const data = await res.json();
              const content = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));
              const parsed = this.parseCSV(content);
              
              const headers = parsed[0];
              const nameIdx = headers.indexOf('Name');
              const imgIdx = headers.indexOf('Image');

              if (imgIdx === -1) throw new Error("Image column not found in CSV");

              // 2. Update the row
              let updated = false;
              for (let i = 1; i < parsed.length; i++) {
                // If this is the show we are assigning TO
                if (parsed[i][nameIdx] === showName) {
                  parsed[i][imgIdx] = imageName;
                  updated = true;
                } 
                // If another show was using this image, we don't necessarily unassign it 
                // unless it's a 1-to-1 relationship, but usually it's better to just update the target.
                // However, if we selected "-- Unassigned --", we should update the show that PREVIOUSLY had it.
                // Actually, the select is "Assign THIS image to THAT show".
              }

              if (showName === 'placeholder.png') {
                 // Logic for "Unassigning this image from whoever has it"
                 for (let i = 1; i < parsed.length; i++) {
                   if (parsed[i][imgIdx] === imageName) {
                     parsed[i][imgIdx] = 'placeholder.png';
                     updated = true;
                   }
                 }
              }

              if (!updated && showName !== 'placeholder.png') {
                throw new Error("Could not find show in CSV");
              }

              // 3. Save back to GitHub
              const newContent = this.stringifyCSV(parsed);
              const putRes = await fetch(`https://api.github.com/repos/${this.repo}/contents/${this.csvPath}`, {
                method: 'PUT',
                headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  message: `Assign ${imageName} to ${showName}`,
                  content: btoa(unescape(encodeURIComponent(newContent))),
                  sha: data.sha
                })
              });

              if (!putRes.ok) throw new Error("Failed to save CSV to GitHub");

              this.setStatus(`Success! Assignment updated.`);
              this.fetchShows(); // Refresh local list
            } catch (e) {
              this.setStatus(`Error: ${e.message}`, 'error');
              this.fetchShows(); // Revert local state
            } finally {
              this.loading = false;
            }
          }
        };
      }
    </script>
  </body>
</html>
