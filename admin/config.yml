# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: webdcr/webdcr.github.io
  branch: main

publish_mode: editorial_workflow
local_backend: true
media_folder: assets/audio/news
public_folder: /assets/audio/news
site_url: https://www.webdcr.com

collections:
  - name: authors
    label: Blog Authors
    folder: _authors
    extension: md
    create: true
    slug: "{{slug}}"
    identifier_field: author_id
    editor:
      preview: false
      media_library:
        allow_multiple: false
        choose_url: true
    sortable_fields: [name]
    fields:
      - label: Name
        name: name
        widget: string
        hint: "Format: First Last ’YY"
      - label: Author ID
        name: author_id
        widget: string
        hint: "Lowercase name with hyphens, no class year (e.g., first-last)"
  - name: musicblog
    label: Music Blog
    folder: _musicblog
    extension: md
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sort: date:desc
    format: frontmatter
    editor:
      preview: true
      media_library:
        allow_multiple: false
        choose_url: true
    sortable_fields: [date, title]
    fields:
      - label: Layout
        name: layout
        widget: hidden
        default: blogpost
      - label: Title
        name: title
        widget: string
      - label: Publish Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
      - label: Permalink
        name: permalink
        widget: string
        required: false
        hint: Defaults to /musicblog/<slug>/ when left empty.
      - label: Body
        name: body
        widget: markdown
  - name: news
    label: News
    folder: _news
    extension: md
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sort: date:desc
    format: frontmatter
    editor:
      preview: true
      media_library:
        allow_multiple: false
        choose_url: true
    sortable_fields: [date, title]
    fields:
      - label: Layout
        name: layout
        widget: hidden
        default: newspost
      - label: Title
        name: title
        widget: string
      - label: Publish Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
      - label: Body
        name: body
        widget: markdown
