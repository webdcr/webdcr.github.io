<!DOCTYPE html>
<html lang="en" x-data="directorateUploader()" x-init="init()">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Update Directorate CSV</title>
    <link rel="icon" href="/favicon.ico" />
    <script defer src="/assets/js/alpine.js"></script>
    <script src="auth.js"></script>
  </head>
  <body>
    <div class="admin-content-wrapper">
      <div class="card">
        <h1>Upload new Directorate CSV</h1>
        <form @submit.prevent="handleSubmit">
          <div class="field-group">
            <label for="csvFile">Select updated directorate.csv</label>
            <input id="csvFile" type="file" accept=".csv" @change="handleFileChange" required />
          </div>

          <button type="submit" class="btn btn-primary" :disabled="isSubmitting || !fileContent || !token">
            <span x-show="!isSubmitting">Upload to GitHub</span>
            <span x-show="isSubmitting">Uploading…</span>
          </button>
        </form>

        <template x-if="statusMessage">
          <p class="status" :class="statusType" x-text="statusMessage"></p>
        </template>
      </div>
    </div>

    <script>
      function directorateUploader() {
        return {
          token: window.AdminAuth.getToken(),
          fileContent: '',
          isSubmitting: false,
          statusMessage: '',
          statusType: 'info',
          init() {
            window.addEventListener('admin-auth-changed', () => {
              this.token = window.AdminAuth.getToken();
            });
          },
          handleFileChange(event) {
            const file = event.target.files?.[0];
            if (!file) { this.fileContent = ''; return; }
            file.text().then((text) => { this.fileContent = text; });
          },
          setStatus(message, type = 'info') {
            this.statusMessage = message;
            this.statusType = type === 'error' ? 'error' : 'info';
          },
          async handleSubmit() {
            this.isSubmitting = true;
            this.setStatus('Contacting GitHub…');
            try {
              const sha = await this.fetchCurrentSha();
              await this.uploadNewCsv(sha);
              this.setStatus('Success! The directorate CSV was updated.', 'info');
            } catch (error) { this.setStatus(error.message, 'error'); } finally { this.isSubmitting = false; }
          },
          async fetchCurrentSha() {
            const endpoint = 'https://api.github.com/repos/webdcr/webdcr.github.io/contents/_data/directorate.csv';
            const res = await fetch(endpoint, {
              headers: { Authorization: `Bearer ${this.token}` }
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Could not find current CSV.');
            return data.sha;
          },
          async uploadNewCsv(sha) {
            const endpoint = 'https://api.github.com/repos/webdcr/webdcr.github.io/contents/_data/directorate.csv';
            const res = await fetch(endpoint, {
              method: 'PUT',
              headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                message: 'Update directorate.csv via admin panel',
                content: btoa(unescape(encodeURIComponent(this.fileContent))),
                sha: sha
              })
            });
            if (!res.ok) {
              const data = await res.json();
              throw new Error(data.message || 'Upload failed.');
            }
          }
        };
      }
    </script>
  </body>
</html>
